name: "Terraform Plan Comment"
description: "Publica ou atualiza um comentário com o plano do Terraform em PRs"

inputs:
  file:
    description: "Caminho do arquivo de plano a ser comentado"
    required: false
    default: "pagemanager/terraform/plan.txt"
  header:
    description: "Título exibido no comentário"
    required: false
    default: "Terraform plan (PageManager)"

runs:
  using: "composite"
  steps:
    - name: Postar comentário do plano
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const filePath = core.getInput('file') || 'pagemanager/terraform/plan.txt';
          const header = core.getInput('header') || 'Terraform plan (PageManager)';
          let body = `#### ${header}\n\n`;
          try {
            body += '```\n' + fs.readFileSync(filePath, 'utf8').slice(0, 65000) + '\n```';
          } catch (e) {
            body += '_Ver logs._';
          }
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const bot = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes(header));
          if (bot) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: bot.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
